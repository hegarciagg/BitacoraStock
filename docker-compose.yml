version: "3.9"

services:
  # ── Python HMM Microservice ───────────────────────────────────────────────
  hmm-service:
    build:
      context: ./hmm-service
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Express/tRPC Backend ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - HMM_SERVICE_URL=http://hmm-service:8000
    depends_on:
      hmm-service:
        condition: service_healthy
    restart: unless-stopped
